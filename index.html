<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App with Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css" integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
   
    <div class="todo-card">
        <h2 class="todo-title">Todo App</h2>

        <!-- add task -->
         <div class="input-group mb-3">
            <input type="text" id="todoInput" class="form-control" placeholder="Enter Task">
            <button class="btn btn-success" onclick="addTodos()"><i class="bi bi-plus"></i></button>
         </div>

         <!-- search -->

         <input type="text" id="searchInput" 
         class="form-control mb-3" 
         placeholder="Search task..." 
         onkeyup="searchTodo()">
         <ul class="list-group" id="todoList"></ul>
         <div id="pagination" class="mt-3 text-center"></div>
    </div>

    <script src="script.js"></script>
    
</body>
</html>
